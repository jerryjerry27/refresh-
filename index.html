<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Refresh</title>

<style>
:root{
  --primary:#0071e3;
  --accent:#4cc9f0;
  --bg:#f5f5f7;
  --text:#1d1d1f;
  --sub:#6e6e73;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
  text-align:center;
  overflow-x:hidden;
}

/* ===== 顶部导航栏 ===== */
.navbar{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:70px;
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(20px);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 40px;
  box-shadow:0 5px 20px rgba(0,0,0,0.05);
  z-index:1000;
}

.navbar .logo-text{
  font-weight:600;
  font-size:18px;
}

.navbar .nav-links{
  display:flex;
  gap:30px;
}

.navbar a{
  text-decoration:none;
  color:var(--text);
  font-size:15px;
  transition:.3s;
}

.navbar a:hover{
  color:var(--primary);
}

.menu-toggle{
  display:none;
  font-size:26px;
  cursor:pointer;
}

/* ===== 移动端 ===== */
@media (max-width:768px){

  .menu-toggle{
    display:block;
  }

  .nav-links{
    position:absolute;
    top:70px;
    right:0;
    width:220px;
    background:rgba(255,255,255,0.95);
    backdrop-filter:blur(20px);
    flex-direction:column;
    align-items:flex-start;
    padding:20px;
    gap:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    transform:translateX(100%);
    transition:.3s ease;
  }

  .nav-links.active{
    transform:translateX(0);
  }

  .navbar{
    padding:0 20px;
  }
}

body::before{
  content:"";
  position:fixed;
  width:600px;
  height:600px;
  background:radial-gradient(circle at center, rgba(76,201,240,0.15), transparent 70%);
  top:-200px;
  left:-200px;
  z-index:-1;
}

.hero{
  padding:180px 20px 80px;
}

.logo{
  margin-bottom:30px;
  animation:float 6s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}

h1{
  font-size:48px;
  font-weight:600;
  margin-bottom:20px;
}

.subtitle{
  font-size:20px;
  color:var(--sub);
  margin-bottom:40px;
}

.buttons{
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
}

button{
  padding:14px 28px;
  border:none;
  border-radius:30px;
  font-size:16px;
  cursor:pointer;
  transition:all .3s ease;
}

.primary{
  background:var(--primary);
  color:white;
}

.primary:hover{
  transform:translateY(-3px);
  box-shadow:0 10px 25px rgba(0,113,227,0.3);
}

.secondary{
  background:white;
  color:var(--text);
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.secondary:hover{
  transform:translateY(-3px);
}

.features{
  max-width:1100px;
  margin:80px auto;
  padding:0 20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:30px;
}

.card{
  background:white;
  padding:40px 30px;
  border-radius:24px;
  box-shadow:0 15px 40px rgba(0,0,0,0.06);
  transition:all .3s ease;
}

.card:hover{
  transform:translateY(-8px);
  box-shadow:0 25px 60px rgba(0,0,0,0.1);
}

.card h3{
  margin:20px 0 10px;
  font-size:20px;
}

.card p{
  color:var(--sub);
  font-size:15px;
  line-height:1.6;
}

.footer{
  margin:120px 0 40px;
  color:var(--sub);
  font-size:14px;
}

/* ===== 深色模式 ===== */
@media (prefers-color-scheme: dark){
  :root{
    --bg:#0f0f12;
    --text:#f5f5f7;
    --sub:#a1a1a6;
  }

  body{
    background:var(--bg);
    color:var(--text);
  }

  .card{
    background:#1c1c1e;
    box-shadow:0 15px 40px rgba(0,0,0,0.6);
  }

  .secondary{
    background:#1c1c1e;
    color:var(--text);
    box-shadow:0 5px 15px rgba(0,0,0,0.4);
  }

  .navbar{
    background:rgba(20,20,25,0.7);
    box-shadow:0 5px 20px rgba(0,0,0,0.6);
  }

  .nav-links{
    background:rgba(20,20,25,0.95);
  }
}

/* ===== 滚动动画 ===== */
.reveal{
  opacity:0;
  transform:translateY(40px);
  transition:all .8s ease;
}

.reveal.active{
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body>

<nav class="navbar">
  <div class="logo-text">Auto Refresh</div>
  <div class="menu-toggle" id="menuToggle">
    ☰
  </div>
  <div class="nav-links">
    <a href="#">首页</a>
    <a href="#features">功能</a>
    <a href="https://github.com/jerryjerry27/refresh-" target="_blank">GitHub</a>
  </div>
</nav>

<section class="hero">

<div class="logo">
<svg width="120" height="120" viewBox="0 0 200 200">
  <polygon points="100,20 180,160 20,160" fill="black"/>
  <polygon points="100,50 150,150 50,150" fill="gray"/>
  <polygon points="100,80 130,140 70,140" fill="white"/>
</svg>
</div>

<h1>Auto Refresh</h1>
<p class="subtitle">智能自动刷新 · 服务器 IP 解析 · 流量统计</p>

<div class="buttons">
<button class="primary" onclick="window.location.href='https://github.com/jerryjerry27/refresh-'">
GitHub
</button>

<button class="secondary" onclick="alert('即将上线 Chrome 商店')">
下载扩展
</button>
</div>

</section>

<section id="features" class="features reveal">

<div class="card reveal">
<h3>🔁 智能自动刷新</h3>
<p>自定义刷新间隔，轻量稳定运行，适合监控页面变化。</p>
</div>

<div class="card reveal">
<h3>🌐 服务器 IP 解析</h3>
<p>自动解析当前网站服务器 IP，快速查看域名解析信息。</p>
</div>

<div class="card reveal">
<h3>📊 页面流量统计</h3>
<p>统计当前页面资源加载大小，帮助分析页面性能。</p>
</div>

</section>

<div class="footer">
Auto Refresh © 2026 · Version 1.4.6
</div>

<script>
const reveals = document.querySelectorAll('.reveal');
const menuToggle = document.getElementById('menuToggle');
const navLinks = document.querySelector('.nav-links');

menuToggle.addEventListener('click', ()=>{
  navLinks.classList.toggle('active');
});

function revealOnScroll(){
  const windowHeight = window.innerHeight;
  reveals.forEach(el=>{
    const elementTop = el.getBoundingClientRect().top;
    if(elementTop < windowHeight - 100){
      el.classList.add('active');
    }
  });
}

window.addEventListener('scroll', revealOnScroll);
window.addEventListener('load', revealOnScroll);
</script>
</body>
</html>
